name: Playwright BDD Tests with Quality Gates

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs: # Solo se escribe una vez
  
  # --- GATE 1: Estática y Seguridad ---
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
      - run: npm ci
      - name: Check Linting
        run: npm run lint

  # --- GATE 2: Automatización (Solo si el Gate 1 pasa) ---
  test:
    needs: static-analysis # <--- ESTO es la "Puerta de Calidad" (Quality Gate)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag: ["@login", "@inventory", "@logout"]

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Generate BDD Test Files
      run: npm run bdd:generate

    - name: Run Playwright tests by tag
      run: npx playwright test --grep "${{ matrix.tag }}"

    - name: Upload Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-${{ matrix.tag }}
        path: playwright-report/
        retention-days: 30