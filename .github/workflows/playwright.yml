name: Playwright BDD Tests

# --- AQUÍ ESTABA EL ERROR: Los eventos deben estar definidos ---
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
# -----------------------------------------------------------

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        # Asegúrate de que estos tags existan en tus archivos .feature
        tag: ["@login", "@inventory", "@logout"]

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Generate BDD Test Files
      run: npm run bdd:generate

    - name: Run Playwright tests by tag
      # Importante: Usar comillas dobles para el grep
      run: npx playwright test --grep "${{ matrix.tag }}"

    - name: Upload Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        # Usamos el tag para que cada reporte sea diferente
        name: playwright-report-${{ matrix.tag }}
        path: playwright-report/
        retention-days: 30